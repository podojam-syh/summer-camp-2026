<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>2026 여름신앙캠프 참가 신청서 — 서하남성당 초등부 주일학교</title>
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI','Noto Sans KR',sans-serif;background:#f5f5f0;color:#1a1a1a;padding:1.5rem 1rem;min-height:100vh}
  .container{max-width:560px;margin:0 auto}
  h1{font-size:20px;font-weight:600;text-align:center;margin-bottom:4px}
  .subtitle{font-size:13px;color:#666;text-align:center;margin-bottom:1.5rem}
  .section{background:#fff;border:1px solid #e5e5e0;border-radius:12px;padding:1.25rem;margin-bottom:1rem}
  .section-title{font-size:14px;font-weight:600;color:#555;margin-bottom:1rem;padding-bottom:8px;border-bottom:1px solid #e5e5e0}
  .field{margin-bottom:1rem}
  .field:last-child{margin-bottom:0}
  label{display:block;font-size:13px;color:#555;margin-bottom:5px}
  input[type=text],input[type=tel],select{width:100%;height:40px;padding:0 12px;border:1px solid #d0d0cc;border-radius:8px;background:#fafafa;color:#1a1a1a;font-size:14px;font-family:inherit;transition:border-color 0.15s}
  input[type=text]:focus,input[type=tel]:focus,select:focus{outline:none;border-color:#4f7ef8;box-shadow:0 0 0 3px rgba(79,126,248,0.12);background:#fff}
  .radio-group{display:flex;gap:8px;flex-wrap:wrap}
  .radio-btn{flex:1;min-width:80px;height:40px;display:flex;align-items:center;justify-content:center;border:1px solid #d0d0cc;border-radius:8px;cursor:pointer;font-size:13px;color:#555;background:#fafafa;user-select:none;transition:all 0.15s}
  .radio-btn:hover{border-color:#4f7ef8;color:#4f7ef8}
  .radio-btn.active{border-color:#4f7ef8;background:#eef2ff;color:#3b5fe0;font-weight:600}
  .child-block{background:#f9f9f7;border:1px solid #e5e5e0;border-radius:8px;padding:1rem;margin-top:10px}
  .child-block-title{font-size:13px;font-weight:600;color:#555;margin-bottom:12px}
  .field-row3{display:grid;grid-template-columns:0.7fr 1fr 1fr;gap:10px;margin-bottom:10px}
  .fee-box{background:#eef2ff;border:1px solid #c7d2fe;border-radius:8px;padding:10px 14px;display:flex;justify-content:space-between;align-items:center;margin-top:12px}
  .fee-label{font-size:13px;color:#3b5fe0}
  .fee-amount{font-size:18px;font-weight:700;color:#3b5fe0}
  .btn-submit{width:100%;height:44px;background:#4f7ef8;color:#fff;border:none;border-radius:8px;font-size:15px;font-weight:600;cursor:pointer;margin-top:1rem;display:flex;align-items:center;justify-content:center;gap:8px;font-family:inherit;transition:background 0.15s}
  .btn-submit:hover{background:#3b6de0}
  .btn-submit:disabled{opacity:0.5;cursor:not-allowed}
  .req{color:#e53e3e}
  .hint{font-size:11px;color:#999;margin-top:3px}
  .toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:#1a1a1a;color:#fff;padding:12px 20px;border-radius:8px;font-size:14px;opacity:0;pointer-events:none;transition:opacity 0.3s;z-index:999;white-space:nowrap}
  .toast.show{opacity:1}
  .spinner{width:16px;height:16px;border:2px solid rgba(255,255,255,0.3);border-top-color:#fff;border-radius:50%;animation:spin 0.7s linear infinite;display:inline-block}
  @keyframes spin{to{transform:rotate(360deg)}}
  .success-msg{background:#f0fff4;border:1px solid #9ae6b4;border-radius:8px;padding:14px;text-align:center;margin-top:1rem;display:none}
  .success-msg .icon{font-size:24px;margin-bottom:6px}
  .success-msg p{font-size:14px;color:#276749;font-weight:500}
  .success-msg small{font-size:12px;color:#48bb78}
  @media(max-width:400px){.field-row3{grid-template-columns:1fr 1fr;}.field-row3>div:last-child{grid-column:span 2}}
</style>
</head>
<body>
<div class="container">
  <h1>⛪ 2026 여름신앙캠프 참가 신청서</h1>
  <p class="subtitle">서하남성당 초등부 주일학교 여름신앙캠프</p>

  <div class="section">
    <div class="section-title">보호자 정보</div>
    <div class="field">
      <label>보호자 이름 <span class="req">*</span></label>
      <input type="text" id="guardian-name" placeholder="홍길동">
    </div>
    <div class="field">
      <label>보호자 연락처 <span class="req">*</span></label>
      <input type="tel" id="guardian-phone" placeholder="010-0000-0000">
    </div>
    <div class="field" style="margin-bottom:0">
      <label>주일학교 등록 여부 <span class="req">*</span></label>
      <div class="radio-group" id="sunday-group">
        <div class="radio-btn" data-val="등록" onclick="selectRadio('sunday-group',this)">등록</div>
        <div class="radio-btn" data-val="미등록" onclick="selectRadio('sunday-group',this)">미등록</div>
      </div>
    </div>
  </div>

  <div class="section">
    <div class="section-title">신청 자녀 수 및 참가비</div>
    <label style="font-size:13px;color:#555;margin-bottom:5px;display:block">자녀 수 선택 <span class="req">*</span></label>
    <div class="radio-group" id="child-count-group">
      <div class="radio-btn" data-val="1" onclick="selectChildCount(1)">1자녀 — 8만원</div>
      <div class="radio-btn" data-val="2" onclick="selectChildCount(2)">2자녀 — 각 6만원</div>
      <div class="radio-btn" data-val="3" onclick="selectChildCount(3)">3자녀 — 각 4만원</div>
    </div>
    <div id="children-container"></div>
    <div class="fee-box" id="fee-box" style="display:none">
      <span class="fee-label">납부 참가비</span>
      <span class="fee-amount" id="fee-display"></span>
    </div>
  </div>

  <button class="btn-submit" id="submit-btn" onclick="submitForm()">
    <span id="submit-label">신청서 제출</span>
  </button>

  <div class="success-msg" id="success-msg">
    <div class="icon">✅</div>
    <p>신청이 완료되었습니다!</p>
    <small>담당자가 확인 후 연락드리겠습니다. 감사합니다 🙏</small>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
const SHEETS_URL = 'https://script.google.com/macros/s/AKfycbxv75OpPCbGJ9tXwVSuMwrrY7Fq5kQDAmtHvjZoq5fkAT1P9sFeddC2beseq2cxKcmOCQ/exec';
let selectedChildCount = 0, isSubmitting = false;
const fees = {1:80000, 2:60000, 3:40000};

function showToast(msg, duration=3000){
  const t=document.getElementById('toast');
  t.textContent=msg; t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'), duration);
}

function selectRadio(groupId, el){
  document.querySelectorAll('#'+groupId+' .radio-btn').forEach(b=>b.classList.remove('active'));
  el.classList.add('active');
}

function selectChildCount(n){
  selectedChildCount=n;
  document.querySelectorAll('#child-count-group .radio-btn').forEach(b=>b.classList.remove('active'));
  document.querySelector('#child-count-group [data-val="'+n+'"]').classList.add('active');
  renderChildren(n);
  document.getElementById('fee-box').style.display='flex';
  document.getElementById('fee-display').textContent=(fees[n]*n).toLocaleString()+'원';
}

function renderChildren(n){
  const c=document.getElementById('children-container');
  c.innerHTML='';
  for(let i=1;i<=n;i++){
    c.innerHTML+=`
    <div class="child-block">
      <div class="child-block-title">${i}번째 자녀 정보</div>
      <div class="field-row3">
        <div>
          <label>학년 <span class="req">*</span></label>
          <select id="child-grade-${i}">
            <option value="">선택</option>
            <option>초1</option><option>초2</option><option>초3</option>
            <option>초4</option><option>초5</option><option>초6</option>
            <option>중1</option><option>중2</option><option>중3</option>
          </select>
        </div>
        <div>
          <label>이름 <span class="req">*</span></label>
          <input type="text" id="child-name-${i}" placeholder="홍민준">
        </div>
        <div>
          <label>세례명</label>
          <input type="text" id="child-baptism-${i}" placeholder="요한">
        </div>
      </div>
      <div>
        <label>주민등록번호 <span class="req">*</span></label>
        <input type="text" id="child-rrn-${i}" placeholder="000000-0000000" maxlength="14" oninput="fmtRRN(this)">
        <div class="hint">보험 가입 목적으로만 사용됩니다</div>
      </div>
    </div>`;
  }
}

function fmtRRN(el){
  let v=el.value.replace(/[^0-9]/g,'');
  if(v.length>6) v=v.slice(0,6)+'-'+v.slice(6,13);
  el.value=v;
}

function selectRadioVal(groupId){
  const a=document.querySelector('#'+groupId+' .radio-btn.active');
  return a?a.dataset.val:'';
}

function collectForm(){
  const gName=document.getElementById('guardian-name').value.trim();
  const gPhone=document.getElementById('guardian-phone').value.trim();
  const sunday=selectRadioVal('sunday-group');
  if(!gName){showToast('보호자 이름을 입력해주세요.');return null;}
  if(!gPhone){showToast('보호자 연락처를 입력해주세요.');return null;}
  if(!sunday){showToast('주일학교 등록 여부를 선택해주세요.');return null;}
  if(!selectedChildCount){showToast('신청 자녀 수를 선택해주세요.');return null;}
  const children=[];
  for(let i=1;i<=selectedChildCount;i++){
    const cName=document.getElementById('child-name-'+i).value.trim();
    const cGrade=document.getElementById('child-grade-'+i).value;
    const cBaptism=document.getElementById('child-baptism-'+i).value.trim();
    const cRRN=document.getElementById('child-rrn-'+i).value.trim();
    if(!cName){showToast(i+'번째 자녀 이름을 입력해주세요.');return null;}
    if(!cGrade){showToast(i+'번째 자녀 학년을 선택해주세요.');return null;}
    if(!cRRN||cRRN.length<14){showToast(i+'번째 자녀 주민등록번호를 올바르게 입력해주세요.');return null;}
    children.push({grade:cGrade, name:cName, baptism:cBaptism||'—', rrn:cRRN});
  }
  return {
    timestamp: new Date().toLocaleString('ko-KR'),
    guardianName:gName, guardianPhone:gPhone, sunday,
    childCount:selectedChildCount,
    fee:fees[selectedChildCount]*selectedChildCount,
    children
  };
}

async function submitForm(){
  if(isSubmitting) return;
  const entry=collectForm();
  if(!entry) return;

  isSubmitting=true;
  const btn=document.getElementById('submit-btn');
  const label=document.getElementById('submit-label');
  btn.disabled=true;
  label.innerHTML='<span class="spinner"></span> 제출 중...';

  try{
    await fetch(SHEETS_URL,{
      method:'POST',
      mode:'no-cors',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify(entry)
    });
    // no-cors 모드에서는 응답 확인 불가, 성공으로 간주
    resetForm();
    document.getElementById('success-msg').style.display='block';
    document.getElementById('success-msg').scrollIntoView({behavior:'smooth'});
  } catch(err){
    showToast('제출 중 오류가 발생했습니다. 다시 시도해주세요.', 4000);
  }

  btn.disabled=false;
  label.textContent='신청서 제출';
  isSubmitting=false;
}

function resetForm(){
  document.getElementById('guardian-name').value='';
  document.getElementById('guardian-phone').value='';
  document.querySelectorAll('.radio-btn').forEach(b=>b.classList.remove('active'));
  selectedChildCount=0;
  document.getElementById('children-container').innerHTML='';
  document.getElementById('fee-box').style.display='none';
}
</script>
</body>
</html>
